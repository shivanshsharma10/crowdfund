version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crowdfund_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crowdfund}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crowdfund_secret}
      POSTGRES_DB: ${POSTGRES_DB:-crowdfund_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crowdfund} -d ${POSTGRES_DB:-crowdfund_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crowdfund_net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: crowdfund_cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - crowdfund_net
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: crowdfund_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crowdfund}:${POSTGRES_PASSWORD:-crowdfund_secret}@postgres:5432/${POSTGRES_DB:-crowdfund_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_super_secret_jwt_key_in_production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin_password_change_me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NODE_ENV: production
    ports:
      - "3001:3000"
    networks:
      - crowdfund_net
    command: >
        sh -c "
          echo '⏳ Waiting for database...' &&
          node /app/node_modules/prisma/build/index.js db push --accept-data-loss &&
          echo '✅ Database schema synced' &&
          node server.js
        "


volumes:
  postgres_data:
    driver: local

networks:
  crowdfund_net:
    driver: bridge
